sensor:
  - platform: homeassistant
    id: climate_current
    entity_id: climate.thermostat_2
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_climate_current
          text: !lambda |-
            char b[16]; snprintf(b, sizeof(b), "%.1f\u00B0", x); return std::string(b);
  - platform: homeassistant
    id: climate_target
    entity_id: climate.thermostat_2
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: lbl_climate_target
          text: !lambda |-
            char b[16]; snprintf(b, sizeof(b), "%.1f\u00B0", x); return std::string(b);

script:
  - id: sync_tiles
    then:
      - if:
          condition:
            lambda: 'return id(light_1_state).state;'
          then:
            - lvgl.widget.update:
                id: tile_1
                bg_color: !lambda |-
                  auto s = id(light_1_rgb).state; int r, g, b;
                  if (sscanf(s.c_str(), "%*[^0-9]%d%*[^0-9]%d%*[^0-9]%d", &r, &g, &b) == 3)
                    return lv_color_hex(((uint32_t)r << 16) | ((uint32_t)g << 8) | (uint32_t)b);
                  return lv_color_hex(0xFFB454);
            - lvgl.label.update:
                id: tile_1_lbl
                text_color: !lambda |-
                  auto s = id(light_1_rgb).state; int r, g, b;
                  if (sscanf(s.c_str(), "%*[^0-9]%d%*[^0-9]%d%*[^0-9]%d", &r, &g, &b) == 3) {
                    int lum = (r*299 + g*587 + b*114) / 1000;
                    return lum > 140 ? lv_color_hex(0x0B0E14) : lv_color_hex(0xE6E9EF);
                  }
                  return lv_color_hex(0x0B0E14);
          else:
            - lvgl.widget.update: { id: tile_1, bg_color: 0x1A1F2B }
            - lvgl.label.update:  { id: tile_1_lbl, text_color: 0xE6E9EF }
