# =============================================================================
#  Waveshare ESP32-S3-Touch-LCD-7  -  Home Assistant wall panel
#  Tabs: Lights(10, colour) / Music / Spotify / Plex / Climate
#  Music + Spotify show album art via online_image (two-phase fetch).
#  Requires ESPHome 2025.8.0+
# =============================================================================

psram:
  mode: octal
  speed: 80MHz

esp32:
  framework:
    sdkconfig_options:
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

substitutions:
  name: wall-panel
  friendly_name: "Wall Panel"
  ha_base_url: "http://192.168.0.237:8123"          # <-- your HA URL (from your boot log). Verify.
  spotify_player: media_player.spotifyplus_jimmy_white
  # Palette: bg 0x0B0E14 surface 0x1A1F2B accent 0xFFB454 text 0xE6E9EF dim 0x7A8290

packages:
  waveshare:
    url: https://github.com/inytar/waveshare-esp32-s3-touch-lcd-7-esphome
    files: [waveshare-esp32-s3-touch-lcd-7.yaml]
    ref: main
    refresh: 1d

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - delay: 3s
    - script.execute: sync_tiles

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  hardware_uart: UART0
  level: DEBUG

http_request:
  timeout: 10s
  watchdog_timeout: 15s


time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda 'return id(ha_time).now().strftime("%H:%M");'

font:
  - { file: "gfonts://Roboto", id: font_lg, size: 44, bpp: 4 }
  - { file: "gfonts://Roboto", id: font_md, size: 26, bpp: 4 }
  - { file: "gfonts://Roboto", id: font_sm, size: 18, bpp: 4 }
  - { file: "gfonts://Roboto", id: font_xs, size: 16, bpp: 4 }

# Shared album-art buffer. on_download_finished re-points both art widgets.
online_image:
  - id: art_music
    url: "${ha_base_url}/local/wp_music.jpg"
    format: jpeg
    type: RGB565
    resize: 200x200
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_music_art, src: art_music }
    on_error:
      - logger.log: { level: WARN, format: "music art load failed" }
  - id: art_spotify
    url: "${ha_base_url}/local/wp_spotify.jpg"
    format: jpeg
    type: RGB565
    resize: 200x200
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_spotify_art, src: art_spotify }
    on_error:
      - logger.log: { level: WARN, format: "spotify art load failed" }
  - id: art_plex
    url: "${ha_base_url}/local/wp_plex.jpg"
    format: jpeg
    type: RGB565
    resize: 360x360
    update_interval: never
    on_download_finished:
      - lvgl.image.update: { id: img_plex_art, src: art_plex }
    on_error:
      - logger.log: { level: WARN, format: "plex art load failed" }



